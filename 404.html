<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Carer Pharmaceutical</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var segments = l.pathname.split('/');
      // If landing exactly on /carer-pharma-website with no trailing slash, redirect to add it
      if (segments[segments.length - 1] === 'carer-pharma-website') {
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/carer-pharma-website/');
      } else {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          segments.slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          segments.slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body>
  </body>
</html>
